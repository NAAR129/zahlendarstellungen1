<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mathe-Abenteuer</title>

  <style>
    body{
  font-family:"Comic Sans MS",sans-serif;
  background:linear-gradient(135deg,#a1c4fd,#c2e9fb);
  margin:0;
  padding:20px;
  text-align:center;
  color:#333;
}
h1{font-size:2.4rem;margin:25px 0;color:#2c3e50;}

button{
  cursor:pointer;
  border:none;
  border-radius:20px;
  font-weight:bold;
  transition:0.2s;
}
button:active{transform:translateY(3px);}

.check-btn, .next-btn{
  font-size:1.8rem;
  padding:15px 40px;
  margin:15px;
  background:#f39c12;
  color:white;
  box-shadow:0 6px rgba(0,0,0,0.2);
}

input{
  font-size:1.8rem;
  border:3px solid #555;
  border-radius:15px;
  padding:10px;
  width:110px;
  text-align:center;
  margin:10px;
}

.modus-btn{
  font-size:2rem;
  padding:25px 50px;
  margin:15px;
  color:white;
  box-shadow:0 6px rgba(0,0,0,0.2);
}
#modus1{background:#2ecc71;}
#modus2{background:#3498db;}
#modus3{background:#9b59b6;}

.back-btn{
  background:#34495e;
  color:white;
  font-size:1.4rem;
  padding:10px 25px;
  margin:15px;
}

.game-container{display:none;max-width:1000px;margin:auto;}

.block-area{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
  margin:30px 0;
}

.bundle-row{
  display:flex;
  gap:40px;
}

.bundle{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.zehner-stange{
  display:flex;
  gap:2px;
}

.zehner-stange div{
  width:22px;
  height:22px;
  background:#e74c3c;
}

.correct{color:#27ae60;font-size:2rem;margin:20px 0;}
.wrong{color:#e74c3c;font-size:1.8rem;margin:20px 0;}

.wort-h{color:#2ecc71;font-weight:bold;}
.wort-z{color:#e74c3c;font-weight:bold;}
.wort-e{color:#3498db;font-weight:bold;}
.wort-und{color:#2c3e50;font-weight:bold;}

#geschriebene-geheim{
  font-size:3rem;margin:25px;min-height:80px;
}
.geheim-btn{
  font-size:2.6rem;
  padding:20px 40px;
  border:none;border-radius:20px;
  margin:10px;
  color:white;
}
.g-gruen{background:#2ecc71;}
.g-rot{background:#e74c3c;}
.g-blau{background:#3498db;}
.g-grau{background:#95a5a6;}

@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg);opacity:0;}
}
  

/* --- Responsive improvements (added) --- */
*{box-sizing:border-box;}
img,video,canvas{max-width:100%;height:auto;}

:root{
  --fs-h1: clamp(1.6rem, 4.5vw, 2.4rem);
  --fs-big: clamp(1.1rem, 3.8vw, 2rem);
  --fs-btn: clamp(1.05rem, 3.6vw, 1.8rem);
  --pad-page: clamp(10px, 3.5vw, 20px);
}

body{
  padding: var(--pad-page);
}

h1{
  font-size: var(--fs-h1);
}

button{
  font-size: var(--fs-btn);
  max-width: 100%;
  white-space: normal;
}

input{
  font-size: var(--fs-btn);
  width: min(220px, 90vw);
  max-width: 100%;
}

#start-screen{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

#start-screen .modus-btn{
  width:min(520px, 95vw);
  padding: clamp(14px, 3.8vw, 25px) clamp(18px, 5vw, 50px);
  font-size: var(--fs-big);
}

.game-container{
  width:100%;
  max-width: 1000px;
}

.block-area{
  width:100%;
  max-width:100%;
  overflow-x:auto;          /* prevents layout breaking on small screens */
  -webkit-overflow-scrolling: touch;
  padding-bottom: 6px;
}

.bundle-row{
  flex-wrap: wrap;
  justify-content: center;
  gap: clamp(12px, 4vw, 40px);
}

.zehner-stange div{
  width: clamp(12px, 2.8vw, 22px);
  height: clamp(12px, 2.8vw, 22px);
}

/* Tighten spacing on small phones */
@media (max-width: 420px){
  .check-btn, .next-btn{
    padding: 12px 18px;
    margin: 10px 6px;
    width: min(320px, 95vw);
  }
  .back-btn{
    width: min(260px, 90vw);
  }
  #zahl-wort, #zahl-normal{
    font-size: clamp(1.6rem, 7vw, 2.4rem) !important;
  }
  #geschriebene-geheim{
    font-size: clamp(2rem, 10vw, 3rem);
  }
}
/* --- end responsive improvements --- */

</style>

  
</head>
<body>
  <div id="start-screen">
<h1>🌟 Mathe-Abenteuer 🌟</h1>
<button class="modus-btn" id="modus1" onclick="starteSpiel(1)">Zehner → Hunderter</button>
<button class="modus-btn" id="modus2" onclick="starteSpiel(2)">Zahlen lesen</button>
<button class="modus-btn" id="modus3" onclick="starteSpiel(3)">Geheimschrift</button>
</div>

<!-- MODUS 1 -->
<div id="game1" class="game-container">
<button class="back-btn" onclick="zurueckZumStart()">← Zurück</button>
<h1>Wie viele Hunderter kannst du bauen?</h1>
<div id="blockArea" class="block-area"></div>

<div>
<label>Wie viele Hunderter?</label>
<input type="number" id="hunderter">
<label>Wie viele Zehner bleiben übrig?</label>
<input type="number" id="zehner">
</div>

<button class="check-btn" onclick="pruefe(1)">Prüfen</button>
<button class="next-btn" id="nextBtn1" onclick="naechsteAufgabe(1)">Weiter</button>
<div id="feedback1"></div>
</div>

<!-- MODUS 2 -->
<div id="game2" class="game-container">
<button class="back-btn" onclick="zurueckZumStart()">← Zurück</button>
<h1>Zahlen lesen</h1>
<div id="zahl-wort" style="font-size:2.8rem;margin:30px 0;"></div>
<input type="number" id="zahl-eingabe"><br>
<button class="check-btn" onclick="pruefe(2)">Prüfen</button>
<button class="next-btn" id="nextBtn2" onclick="naechsteAufgabe(2)">Weiter</button>
<div id="feedback2"></div>
<div id="loesung2" style="font-size:2.4rem;margin-top:15px;"></div>
</div>

<!-- MODUS 3 -->
<div id="game3" class="game-container">
<button class="back-btn" onclick="zurueckZumStart()">← Zurück</button>
<h1>Geheimschrift</h1>
<div id="zahl-normal" style="font-size:2.8rem;margin:15px;"></div>
<div id="geschriebene-geheim">...</div>

<div>
<button class="geheim-btn g-gruen" onclick="addSymbol('□')">□</button>
<button class="geheim-btn g-rot" onclick="addSymbol('|')">|</button>
<button class="geheim-btn g-blau" onclick="addSymbol('•')">•</button>
<button class="geheim-btn g-grau" onclick="loescheLetztes()">←</button>
</div>

<button class="check-btn" onclick="pruefe(3)">Prüfen</button>
<button class="next-btn" id="nextBtn3" onclick="naechsteAufgabe(3)">Weiter</button>
<div id="feedback3"></div>
</div>

  <script>
    let aufgaben1=[10,20,15,30,38,24,12,27,33,19];
let aufgaben2=[
{wort:"dreihundertvierundfünfzig",zahl:354},
{wort:"zweihundertneununddreißig",zahl:239},
{wort:"einhundertsechsundzwanzig",zahl:126}
];
let aufgaben3=[132,205,341,87,419];
let aktuell=[0,0,0];
let aktuelleGeheimschrift="";

function mischeArray(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function zurueckZumStart(){
document.querySelectorAll(".game-container").forEach(g=>g.style.display="none");
document.getElementById("start-screen").style.display="block";
}

function starteSpiel(m){
document.getElementById("start-screen").style.display="none";
document.getElementById("game"+m).style.display="block";
if(m===1)mischeArray(aufgaben1);
if(m===2)mischeArray(aufgaben2);
if(m===3)mischeArray(aufgaben3);
ladeAufgabe(m);
}

function ladeAufgabe(m){
document.getElementById("nextBtn"+m).disabled=true;

if(m===1){
zeichneZehner(aufgaben1[aktuell[0]]);
document.getElementById("hunderter").value="";
document.getElementById("zehner").value="";
document.getElementById("feedback1").innerHTML="";
}

if(m===2){
let obj=aufgaben2[aktuell[1]];
document.getElementById("zahl-wort").textContent=obj.wort;
document.getElementById("zahl-eingabe").value="";
document.getElementById("feedback2").innerHTML="";
document.getElementById("loesung2").innerHTML="";
}

if(m===3){
document.getElementById("zahl-normal").textContent=aufgaben3[aktuell[2]];
aktuelleGeheimschrift="";
document.getElementById("geschriebene-geheim").innerHTML="...";
document.getElementById("feedback3").innerHTML="";
}
}

/* ZEICHNEN */
function zeichneZehner(n){
let area=document.getElementById("blockArea");
area.innerHTML="";
let bundleCount=Math.ceil(n/5);
let rowCount=Math.ceil(bundleCount/2);
let zehnerIndex=0;

for(let r=0;r<rowCount;r++){
let row=document.createElement("div");
row.className="bundle-row";

for(let b=0;b<2;b++){
if(zehnerIndex>=n)break;
let bundle=document.createElement("div");
bundle.className="bundle";

for(let i=0;i<5;i++){
if(zehnerIndex>=n)break;
let stange=document.createElement("div");
stange.className="zehner-stange";
for(let j=0;j<10;j++){
stange.appendChild(document.createElement("div"));
}
bundle.appendChild(stange);
zehnerIndex++;
}
row.appendChild(bundle);
}
area.appendChild(row);
}
}

function pruefe(m){

if(m===2){
let obj=aufgaben2[aktuell[1]];
let eing=parseInt(document.getElementById("zahl-eingabe").value)||0;

/* Farbliche Zerlegung immer anzeigen */
let wort=obj.wort;
let teile=wort.split("hundert");
let hTeil=teile[0]+"hundert";
let rest=teile[1]||"";
let eTeil="",zTeil="";
if(rest.includes("und")){
let p=rest.split("und");
eTeil=p[0];
zTeil=p[1];
}else{zTeil=rest;}
let farbig=`<span class='wort-h'>${hTeil}</span>`+
(eTeil?`<span class='wort-e'>${eTeil}</span><span class='wort-und'>und</span>`:"")+
(zTeil?`<span class='wort-z'>${zTeil}</span>`:"");
document.getElementById("loesung2").innerHTML=farbig;

if(eing===obj.zahl){
document.getElementById("feedback2").innerHTML="<div class='correct'>Richtig! 🌟</div>";
document.getElementById("nextBtn2").disabled=false;
feiereSieg();
}else{
document.getElementById("feedback2").innerHTML="<div class='wrong'>Die Antwort ist nicht richtig, probiere es erneut.</div>";
}
}

if(m===1){
let total=aufgaben1[aktuell[0]];
let h=parseInt(document.getElementById("hunderter").value)||0;
let z=parseInt(document.getElementById("zehner").value)||0;
let rh=Math.floor(total/10);
let rz=total%10;

if(h===rh && z===rz){
document.getElementById("feedback1").innerHTML="<div class='correct'>Richtig! 🌟</div>";
document.getElementById("nextBtn1").disabled=false;
feiereSieg();
}else{
document.getElementById("feedback1").innerHTML="<div class='wrong'>Die Antwort ist nicht richtig, probiere es erneut.<br><br>Tipp: 10 Zehner sind 1 Hunderter.</div>";
}
}

if(m===3){
let zahl=aufgaben3[aktuell[2]];
let h=Math.floor(zahl/100);
let z=Math.floor((zahl%100)/10);
let e=zahl%10;
let clean=aktuelleGeheimschrift.replace(/[^□|•]/g,"");
let q=(clean.match(/□/g)||[]).length;
let s=(clean.match(/\|/g)||[]).length;
let p=(clean.match(/•/g)||[]).length;

if(q===h&&s===z&&p===e){
document.getElementById("feedback3").innerHTML="<div class='correct'>Richtig! 🌟</div>";
document.getElementById("nextBtn3").disabled=false;
feiereSieg();
}else{
document.getElementById("feedback3").innerHTML="<div class='wrong'>Die Antwort ist nicht richtig, probiere es erneut.</div>";
}
}
}

function naechsteAufgabe(m){
aktuell[m-1]++;
if(m===1&&aktuell[0]>=aufgaben1.length)aktuell[0]=0;
if(m===2&&aktuell[1]>=aufgaben2.length)aktuell[1]=0;
if(m===3&&aktuell[2]>=aufgaben3.length)aktuell[2]=0;
ladeAufgabe(m);
}

function addSymbol(s){
aktuelleGeheimschrift+=s;
let farbig=aktuelleGeheimschrift
.replace(/□/g,"<span style='color:#2ecc71'>□</span>")
.replace(/\|/g,"<span style='color:#e74c3c'>|</span>")
.replace(/•/g,"<span style='color:#3498db'>•</span>");
document.getElementById("geschriebene-geheim").innerHTML=farbig||"...";
}

function loescheLetztes(){
aktuelleGeheimschrift=aktuelleGeheimschrift.slice(0,-1);
addSymbol("");
}

function feiereSieg(){
const c=document.createElement("div");
c.style.position="fixed";
c.style.inset="0";
c.style.pointerEvents="none";
document.body.appendChild(c);
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.innerHTML="★";
s.style.position="absolute";
s.style.left=Math.random()*100+"vw";
s.style.top="-40px";
s.style.fontSize="2rem";
s.style.color="gold";
s.style.animation="fall 3s linear forwards";
c.appendChild(s);
}
setTimeout(()=>c.remove(),3000);
}
  </script>
</body>
</html>
